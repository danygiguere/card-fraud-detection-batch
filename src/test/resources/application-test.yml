spring:
  application:
    name: card-fraud-detection-batch-test
  batch:
    jdbc:
      initialize-schema: always
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: true
    out-of-order: false
  threads:
    virtual:
      enabled: true

batch:
  partition-count: 2
  chunk-size: 5
  input-file: classpath:data/transactions.csv
  cardholders-file: classpath:data/cardholders.csv
  flagged-output-file: build/test-output/flagged_transactions.csv
